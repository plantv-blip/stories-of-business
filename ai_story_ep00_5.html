<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이야기로 읽는 회사 — EP.00.5 리더십 레이어</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0e0c0a;
  --bg2:    #161410;
  --bg3:    #1e1b16;
  --ink:    #f0ece3;
  --ink2:   #c8c4ba;
  --muted:  #6a6760;
  --rule:   rgba(240,236,227,0.08);
  --rule2:  rgba(240,236,227,0.04);
  --gold:   #d4a853;
  --gold2:  #a07828;
  --openai: #10a37f;
  --openai-d: #0a6b53;
  --anthropic: #d97706;
  --anthropic-d: #8a4d04;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Serif KR', serif;
  font-weight: 300;
  line-height: 1.8;
}

/* MASTHEAD */
.masthead {
  border-bottom: 1px solid var(--rule);
  padding: 0 56px;
  background: var(--bg2);
}
.masthead-top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0 12px; border-bottom: 1px solid var(--rule);
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
}
.series-name {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em;
  color: var(--muted); text-transform: uppercase; text-align: center;
  padding: 16px 0 8px;
}
.headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(30px, 5vw, 58px); font-weight: 400;
  line-height: 1.1; text-align: center; padding: 0 0 8px;
  letter-spacing: -0.02em; color: var(--ink);
}
.headline em { font-style: italic; color: var(--gold); }
.deck {
  font-size: 14.5px; font-weight: 300; text-align: center; color: var(--ink2);
  padding: 8px 0 20px; max-width: 700px; margin: 0 auto; line-height: 1.65;
}
.masthead-byline {
  border-top: 1px solid var(--rule); display: flex; justify-content: center;
  gap: 32px; padding: 10px 0; font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; color: var(--muted);
}

/* CONTENT */
.content-wrap { max-width: 1060px; margin: 0 auto; padding: 0 56px; }

/* CHAPTER */
.chapter { padding: 52px 0 0; }
.chapter-tag {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.chapter-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3vw, 32px); font-weight: 400;
  line-height: 1.2; margin-bottom: 10px; color: var(--ink);
}
.chapter-title em { font-style: italic; color: var(--gold); }
.chapter-rule { border: none; border-top: 1px solid var(--rule); margin: 0 0 28px; }

/* PROSE */
.prose {
  font-size: 14.5px; line-height: 1.88; color: var(--ink2);
  margin-bottom: 22px; max-width: 780px;
}
.prose strong { font-weight: 600; color: var(--ink); }

/* PULL QUOTE */
.pull {
  border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  padding: 32px 0; margin: 36px 0; text-align: center;
}
.pull p {
  font-family: 'Playfair Display', serif; font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 400; font-style: italic; line-height: 1.5;
  max-width: 700px; margin: 0 auto; color: var(--ink);
}
.pull span { color: var(--gold); }
.pull .attr {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
  margin-top: 12px; letter-spacing: 0.08em; font-style: normal;
}

/* LEADER CARD */
.leader-card {
  border: 1px solid var(--rule); margin: 28px 0 36px; overflow: hidden;
}
.leader-header {
  padding: 28px 32px; display: flex; align-items: center; gap: 24px;
}
.leader-header.openai { border-left: 4px solid var(--openai); background: rgba(16,163,127,0.06); }
.leader-header.anthropic { border-left: 4px solid var(--anthropic); background: rgba(217,119,6,0.06); }
.leader-avatar {
  width: 72px; height: 72px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 32px;
  flex-shrink: 0;
}
.leader-avatar.openai { background: rgba(16,163,127,0.15); }
.leader-avatar.anthropic { background: rgba(217,119,6,0.15); }
.leader-role {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.16em;
  text-transform: uppercase; margin-bottom: 4px;
}
.leader-role.openai { color: var(--openai); }
.leader-role.anthropic { color: var(--anthropic); }
.leader-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; }
.leader-name-kr { font-size: 14px; color: var(--muted); margin-top: 2px; }
.leader-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.leader-tag {
  font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 9px;
  border: 1px solid var(--rule); color: var(--muted); letter-spacing: 0.04em;
}
.leader-body { padding: 0 32px 28px; }
.leader-body .prose { margin-bottom: 18px; }

/* TIMELINE */
.timeline { padding: 0 0 0 40px; margin: 24px 0 36px; position: relative; }
.timeline::before {
  content: ''; position: absolute; left: 7px; top: 0; bottom: 0;
  width: 1px; background: var(--rule);
}
.tl-item { position: relative; padding: 0 0 28px 24px; }
.tl-item::before {
  content: ''; position: absolute; left: -40px; top: 6px;
  width: 13px; height: 13px; border-radius: 50%;
  border: 2px solid var(--muted); background: var(--bg);
}
.tl-item.openai::before { border-color: var(--openai); }
.tl-item.anthropic::before { border-color: var(--anthropic); }
.tl-item.key::before { background: var(--gold); border-color: var(--gold); }
.tl-year {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  letter-spacing: 0.08em; margin-bottom: 4px;
}
.tl-label {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 2px 7px; display: inline-block;
  margin-bottom: 6px;
}
.tl-label.openai { color: var(--openai); border: 1px solid rgba(16,163,127,0.3); }
.tl-label.anthropic { color: var(--anthropic); border: 1px solid rgba(217,119,6,0.3); }
.tl-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; color: var(--ink); }
.tl-desc { font-size: 13px; line-height: 1.72; color: var(--ink2); max-width: 680px; }

/* COMPARE TABLE */
.compare-grid {
  display: grid; grid-template-columns: 160px 1fr 1fr;
  border: 1px solid var(--rule); margin: 24px 0 36px;
}
.cg-header {
  padding: 14px 18px; font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  border-bottom: 1px solid var(--rule); border-right: 1px solid var(--rule);
  display: flex; align-items: center;
}
.cg-header:last-child { border-right: none; }
.cg-header.openai-h { color: var(--openai); background: rgba(16,163,127,0.04); }
.cg-header.anthropic-h { color: var(--anthropic); background: rgba(217,119,6,0.04); }
.cg-cell {
  padding: 14px 18px; font-size: 13px; line-height: 1.65;
  border-bottom: 1px solid var(--rule2); border-right: 1px solid var(--rule2);
  color: var(--ink2);
}
.cg-cell:last-child { border-right: none; }
.cg-cell.label {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  display: flex; align-items: center;
}
.cg-cell strong { color: var(--ink); font-weight: 600; }

/* NODE MAPPING */
.node-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin: 24px 0 36px;
}
.node-card {
  border: 1px solid var(--rule); padding: 20px; background: var(--bg2);
}
.node-num {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold);
  letter-spacing: 0.12em; margin-bottom: 6px;
}
.node-title { font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--ink); }
.node-card p { font-size: 12.5px; line-height: 1.72; color: var(--ink2); }

/* INSIGHT */
.insight-box {
  background: rgba(212,168,83,0.08); border: 1px solid rgba(212,168,83,0.2);
  border-left: 3px solid var(--gold); padding: 18px 22px; margin: 24px 0 32px;
}
.insight-label {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.insight-box p { font-size: 14px; line-height: 1.78; color: var(--ink); }
.insight-box strong { font-weight: 600; }

/* FOOTER */
footer {
  border-top: 1px solid var(--rule); padding: 16px 56px; margin-top: 56px;
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
  letter-spacing: 0.08em;
}

@media (max-width: 760px) {
  .masthead, .content-wrap, footer { padding-left: 20px; padding-right: 20px; }
  .compare-grid { grid-template-columns: 1fr; }
  .node-grid { grid-template-columns: 1fr; }
  .leader-header { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
