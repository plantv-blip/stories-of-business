<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업가치 순환 프레임워크</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0c0d0f;
  --bg2:       #131417;
  --bg3:       #1a1c20;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --text:      #e8e6e0;
  --muted:     #7a7870;
  --accent:    #d4a853;

  --teal:      #1D9E75;
  --blue:      #378ADD;
  --purple:    #7F77DD;
  --amber:     #EF9F27;
  --green:     #639922;
  --coral:     #D85A30;

  --teal-bg:   rgba(29,158,117,0.12);
  --blue-bg:   rgba(55,138,221,0.12);
  --purple-bg: rgba(127,119,221,0.12);
  --amber-bg:  rgba(239,159,39,0.12);
  --green-bg:  rgba(99,153,34,0.12);
  --coral-bg:  rgba(216,90,48,0.12);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
}

/* ── Header ── */
header {
  padding: 48px 40px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
}
.header-left h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1.15;
}
.header-left h1 em {
  font-style: italic;
  color: var(--accent);
}
.header-left p {
  margin-top: 8px;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.03em;
}
.pill {
  background: rgba(212,168,83,0.1);
  border: 1px solid rgba(212,168,83,0.25);
  color: var(--accent);
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: 0.05em;
}

/* ── Main layout ── */
main {
  display: grid;
  grid-template-columns: 500px 1fr;
  min-height: calc(100vh - 140px);
}

@media (max-width: 900px) {
  main { grid-template-columns: 1fr; }
  header { flex-direction: column; align-items: flex-start; }
}

/* ── Left: SVG panel ── */
.svg-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  position: sticky;
  top: 0;
  height: 100vh;
}

.svg-panel svg { width: 100%; max-width: 420px; cursor: default; }

.ring-hint {
  margin-top: 20px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
}

/* SVG node hover */
.node-g { cursor: pointer; }
.node-g:hover rect, .node-g:hover circle { filter: brightness(1.2); }
.node-g rect, .node-g circle {
  transition: filter 0.18s ease;
}

/* ── Right: Detail panel ── */
.detail-panel {
  padding: 40px 44px;
  overflow-y: auto;
}

.detail-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 300px;
  gap: 16px;
  color: var(--muted);
  text-align: center;
}
.detail-placeholder .arrow-hint {
  font-size: 32px;
  opacity: 0.3;
  transform: rotate(180deg);
  display: inline-block;
}
.detail-placeholder p { font-size: 13px; }

/* Detail content */
#detail-content { display: none; }
#detail-content.visible { display: block; }

.detail-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.detail-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.detail-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 32px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

/* Metric formula box */
.formula-box {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 14px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #c8c4b8;
  line-height: 2;
  margin-bottom: 28px;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Info rows */
.info-grid {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 0;
  margin-bottom: 32px;
}
.info-row {
  display: contents;
}
.info-label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 14px;
}
.info-value {
  font-size: 13px;
  color: #d4d0c8;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  padding-top: 14px;
  line-height: 1.65;
}

/* Insight block */
.insight {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 32px;
}
.insight-head {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.insight-body {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  font-weight: 400;
}
.insight-body strong {
  font-weight: 600;
  color: #fff;
}

/* Node color accents */
.color-teal   { color: var(--teal);   border-color: var(--teal);   background: var(--teal-bg);   }
.color-blue   { color: var(--blue);   border-color: var(--blue);   background: var(--blue-bg);   }
.color-purple { color: var(--purple); border-color: var(--purple); background: var(--purple-bg); }
.color-amber  { color: var(--amber);  border-color: var(--amber);  background: var(--amber-bg);  }
.color-green  { color: var(--green);  border-color: var(--green);  background: var(--green-bg);  }
.color-coral  { color: var(--coral);  border-color: var(--coral);  background: var(--coral-bg);  }

.color-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}

/* Framework tags */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.tag {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 9px;
  border-radius: 4px;
  border: 1px solid;
  letter-spacing: 0.03em;
}

/* Bottom nav */
.node-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 6px 12px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.nav-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(212,168,83,0.06);
}
.nav-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(212,168,83,0.1);
}

/* ── Footer ── */
footer {
  padding: 20px 40px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>기업가치 <em>순환</em> 프레임워크</h1>
    <p>재무제표 × 밸류체인 × 경쟁우위의 통합 구조 — Value Creation Cycle</p>
  </div>
  <span class="pill">5 Frameworks · 6 Nodes</span>
</header>

<main>
  <!-- Left: Diagram -->
  <div class="svg-panel">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" id="main-svg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke="context-stroke"/>
        </marker>
      </defs>

      <!-- 2→3 (top-right → bottom-right) -->
      <path d="M324 185 Q334 213 320 252" fill="none" stroke="rgba(55,138,221,0.55)" stroke-width="1.5" marker-end="url(#arr)"/>

      <text x="286" y="108" font-size="9" fill="rgba(255,255,255,0.28)" font-family="DM Mono,monospace" text-anchor="middle">ROIC</text>

      <g class="node-g" onclick="show(3)" id="node-3">

      <g class="node-g" onclick="show(6)" id="node-6">

    <p class="ring-hint">노드를 클릭하여 상세 분석 보기</p>
  </div>

  <!-- Right: Detail -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-placeholder" id="placeholder">
      <span class="arrow-hint">↑</span>
      <p>다이어그램의 노드를 클릭하면<br>재무제표 매핑, 프레임워크, 경쟁력 메커니즘을<br>상세하게 확인할 수 있습니다</p>

    <div id="detail-content">

      <div class="tag-row" id="d-tags"></div>

</main>

<footer>
  <span>Porter · DuPont · EVA (Stern Stewart) · ROIC Driver Tree · CCC</span>
  <span>Value Creation Cycle Framework</span>
</footer>

const NAV_LABELS = ['전체', '①자본', '②자산', '③밸류체인', '④매출', '⑤EVA', '⑥현금'];
let current = -1;

function show(id) {
  current = id;
  const d = NODES[id];

  // highlight node
  for (let i = 0; i <= 6; i++) {
    const el = document.getElementById('node-' + i);
    if (!el) continue;
    const shapes = el.querySelectorAll('rect, circle');
    shapes.forEach(s => {
      s.style.strokeWidth = (i === id) ? '2' : '1';
      s.style.opacity = (i === id) ? '1' : '0.65';
    });
  }

  document.getElementById('placeholder').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.classList.add('visible');

  document.getElementById('d-eyebrow').textContent = d.eyebrow;
  document.getElementById('d-title').textContent = d.title;
  document.getElementById('d-title').style.color = d.colorHex;
  document.getElementById('d-sub').textContent = d.sub;
  document.getElementById('d-formula').textContent = d.formula;

  const grid = document.getElementById('d-grid');
  grid.innerHTML = d.rows.map(([label, val]) =>
    `<div class="info-row">
      <div class="info-label">${label}</div>
      <div class="info-value">${val}</div>
    </div>`
  ).join('');

  const insight = document.getElementById('d-insight');
  insight.style.borderColor = d.colorHex + '33';
  document.getElementById('d-adv').innerHTML = d.adv;

  const tagRow = document.getElementById('d-tags');
  tagRow.innerHTML = d.tags.map(t =>
    `<span class="tag" style="color:${d.colorHex};border-color:${d.colorHex}44;background:${d.colorHex}0f;">${t}</span>`
  ).join('');

  const nav = document.getElementById('d-nav');
  nav.innerHTML = NAV_LABELS.map((label, i) =>
    `<button class="nav-btn${i === id ? ' active' : ''}" onclick="show(${i})">${label}</button>`
  ).join('');

  document.getElementById('detail-panel').scrollTop = 0;
}

// Initial: show overview
window.addEventListener('load', () => show(0));
